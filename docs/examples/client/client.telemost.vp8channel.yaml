# Клиентский конфиг: telemost + vp8channel
# Запуск: olcrtc docs/examples/client/client.telemost.vp8channel.yaml

mode: cnc

auth:
  provider: telemost

# Для telemost: Room ID, который вернул сервис.
# Должен совпадать с сервером.
room:
  id: "REPLACE_WITH_TELEMOST_ROOM_ID"

crypto:
  # Можно использовать key_file: "./olcrtc.key", чтобы не хранить секрет прямо здесь.
  key: "REPLACE_ME_WITH_64_HEX_CHARS" # должен совпадать с сервером

net:
  transport: vp8channel
  dns: "8.8.8.8:53"

liveness:
  interval: 10s
  timeout: 5s
  failures: 3

socks:
  host: "127.0.0.1"
  port: 8808
  user: "" # необязательная входящая auth
  pass: ""

vp8:
  fps: 30
  batch_size: 64
  # Потолок скорости на проводе (байт/сек). Дефолт 400000 (~400 КБ/с) -
  # консервативно под Telemost. Подними под свой SFU, измерив стабильный
  # максимум реальными запусками. 0 = дефолт.
  # max_bytes_per_sec: 400000

data: data
debug: false
